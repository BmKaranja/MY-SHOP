<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shopping Cart - Tenga & Thrive</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="logo for Tenga and T.png" type="image/x-icon" />
</head>
<body>
    <header class="top">
        <nav class="links" style="margin-top: 0%;background-color: lightgray;">
            <a href="index.html" class="t-links">Home</a>
            <a href="Products.html" class="t-links">Products</a>
            <a href="contactus.html" class="t-links">Contact Us</a>
            <a href="cart.html" class="t-links">Cart (<span id="cart-count">0</span>)</a>
            <a href="login.html" class="t-links">Login</a>
        </nav>
    </header>
    <main style="width:90%; margin: auto; padding: 20px; background-color:lightgray;text-align: center;">
        <section class="cart-container">
            <h1>Your Shopping Cart</h1>
            <div id="cart-items"></div>
            <div class="cart-total">
                <h2>Total: <span id="total-price">$0.00</span></h2>
            </div>
            <button id="checkout-btn" onclick="checkout()">Checkout</button>
        </section>
    </main>
    <script src="script.js"></script>
    <script>
        // Display cart items on page load
        document.addEventListener('DOMContentLoaded', function () {
            displayCart();
            updateCartCount();
        });
    </script>
</body>
</html>
